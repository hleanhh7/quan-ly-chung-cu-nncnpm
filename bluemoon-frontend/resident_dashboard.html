<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cư dân - Chung cư Bluemoon</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .header h2 { margin: 0; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { background: #c0392b; }
        
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #3498db; color: white; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Xin chào Cư dân Bluemoon!</h2>
        <button class="btn-logout" id="btnLogout">Đăng xuất</button>
    </div>

    <div class="card">
        <h3>Lịch sử Hóa đơn Dịch vụ</h3>
        <table>
            <thead>
                <tr>
                    <th>Tháng/Năm</th>
                    <th>Tổng tiền (VNĐ)</th>
                    <th>Trạng thái</th>
                </tr>
            </thead>
            <tbody id="invoiceTableBody">
                <tr><td colspan="3">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>Khai báo Tạm trú / Tạm vắng</h3>
        <form id="declarationForm">
            <div class="form-group">
                <label>Mã Nhân khẩu (Resident ID của bạn)</label>
                <input type="number" id="residentId" required>
            </div>
            <div class="form-group">
                <label>Loại khai báo</label>
                <select id="decType" required>
                    <option value="TamTru">Tạm trú</option>
                    <option value="TamVang">Tạm vắng</option>
                </select>
            </div>
            <div class="form-group">
                <label>Từ ngày</label>
                <input type="date" id="startDate" required>
            </div>
            <div class="form-group">
                <label>Đến ngày</label>
                <input type="date" id="endDate" required>
            </div>
            <div class="form-group">
                <label>Lý do</label>
                <input type="text" id="reason" placeholder="Ví dụ: Về quê, Công tác..." required>
            </div>
            <button type="submit" class="btn-submit">Gửi khai báo</button>
        </form>
    </div>


    <div class="card">
        <h3>Đăng ký Dịch vụ Chung cư</h3>
        <form id="serviceForm">
            <div class="form-group">
                <label>Chọn dịch vụ</label>
                <select id="serviceSelect" required>
                    <option value="">-- Đang tải danh sách dịch vụ --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Số lượng (VD: Số chiếc xe máy)</label>
                <input type="number" id="serviceQuantity" value="1" min="1" required>
            </div>
            <div class="form-group">
                <label>Ngày bắt đầu sử dụng</label>
                <input type="date" id="serviceStartDate" required>
            </div>
            <button type="submit" class="btn-submit">Xác nhận đăng ký</button>
        </form>
    </div>

    <div class="card">
        <h3>Dịch vụ đang sử dụng</h3>
        <table>
            <thead>
                <tr>
                    <th>Tên dịch vụ</th>
                    <th>Số lượng</th>
                    <th>Ngày bắt đầu</th>
                    <th>Đơn giá</th>
                </tr>
            </thead>
            <tbody id="myServicesTableBody">
                <tr><td colspan="4">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="resident.js"></script>
</body>
</html>
