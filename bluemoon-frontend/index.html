<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Chung cư Bluemoon</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            /* Gọi tấm ảnh nền chung cư bạn đã đặt tên */
            background-image: url('anh_nen_dang_nhap.jpg'); 
            
            /* Cấu hình giúp ảnh phủ kín, căn giữa màn hình và không bị lặp lại */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .login-container { 
            /* Tạo nền trắng mờ trong suốt giúp nổi bật trên nền ảnh */
            background: rgba(255, 255, 255, 0.90); 
            /* Tăng khoảng cách đệm bên trong cho ô đăng nhập rộng rãi hơn */
            padding: 45px 35px; 
            border-radius: 16px; 
            /* Đổ bóng sâu hơn một chút tương ứng với kích thước hộp mới */
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3); 
            width: 100%; 
            /* Phóng to chiều rộng của ô đăng nhập lên (cũ là 350px) */
            max-width: 420px; 
            /* Làm mờ nhẹ phần hình nền chung cư ngay phía sau khung */
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-sizing: border-box;
        }
        
        h2 { 
            text-align: center; 
            color: #2c3e50; 
            margin-top: 0; 
            margin-bottom: 30px; 
            font-size: 26px; 
            font-weight: bold;
            letter-spacing: 0.5px; 
            line-height: 1.3;
        }
        
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; color: #34495e; font-weight: bold; font-size: 14.5px; }
        
        /* Tăng kích thước ô nhập dữ liệu một chút để cân xứng với hộp lớn */
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 13px; 
            box-sizing: border-box; 
            border: 1px solid #cccccc; 
            border-radius: 8px; 
            font-size: 15px; 
            transition: all 0.2s ease; 
        }
        input[type="text"]:focus, input[type="password"]:focus { 
            border-color: #3498db; 
            outline: none; 
            box-shadow: 0 0 6px rgba(52, 152, 219, 0.4); 
        }
        
        /* Phóng to nhẹ nút bấm đăng nhập */
        button { 
            width: 100%; 
            padding: 13px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16.5px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.2s; 
            margin-top: 12px; 
        }
        button:hover { background-color: #2980b9; }
        .error-message { color: #e74c3c; text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Bluemoon Apartment </h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" required placeholder="Nhập tài khoản của bạn...">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" required placeholder="Nhập mật khẩu...">
            </div>
            <button type="submit">Đăng nhập</button>
        </form>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>
